<section class="bill">
    <h1>Estimated Bill Calculator</h1>

    <form id="billForm" novalidate>

        <label>Meal Cost ($):</label>
        <input type="number" id="mealCost" min="1" required>
        <span class="error" id="mealCostError"></span>

        <label>Tax (%):</label>
        <input type="number" id="tax" min="0" value="10" required>
        <span class="error" id="taxError"></span>

        <label>Tip (%):</label>
        <input type="number" id="tip" min="0" value="5" required>
        <span class="error" id="tipError"></span>

        <button type="submit">Calculate Bill</button>

    </form>

    <h2 id="billResult"></h2>
</section>
