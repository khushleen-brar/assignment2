<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="recommend.html" class="active">Recommend</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="reservation.html">Reservation</a></li>
        </ul>
    </nav>
</header>

<section>
 class="recommend">

    <h1>Restaurant Recommendation</h1>

    <form id="recommendForm" novalidate>

        <label>Preferred Cuisine:</label>
        <select id="recCuisine" required>
            <option value="">-- Select --</option>
            <option>Indian</option>
            <option>Japanese</option>
            <option>Italian</option>
            <option>Chinese</option>
            <option>Mexican</option>
            <option>Seafood</option>
        </select>
        <span class="error" id="recCuisineError"></span>

        <label>Budget Per Person:</label>
        <select id="recBudget" required>
            <option value="">-- Select --</option>
            <option value="low">$20–$30</option>
            <option value="medium">$30–$40</option>
            <option value="high">$40+</option>
        </select>
        <span class="error" id="recBudgetError"></span>

        <label>Dining Type:</label>
        <select id="recType" required>
            <option value="">-- Select --</option>
            <option>Casual</option>
            <option>Family</option>
            <option>Romantic</option>
            <option>Premium</option>
        </select>
        <span class="error" id="recTypeError"></span>

        <button type="submit">Get Recommendation</button>

    </form>

    <h2 id="recResult"></h2>

</section>

<footer>
    <p>&copy; 2026 Restaurant Finder</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
